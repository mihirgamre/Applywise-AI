services:
  - type: web
    name: applywise-ai
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run prisma:deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: applywise-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: applywise-ai-db
    plan: free
