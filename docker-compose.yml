services:
  postgres:
    image: postgres:16-alpine
    container_name: applywise-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: applywise_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
